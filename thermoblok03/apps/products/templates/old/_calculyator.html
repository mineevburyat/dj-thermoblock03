        <!-- Калькулятор -->
        <div class="calculator-panel" id="calculator">
            <h3 class="calculator-title">🧮 Калькулятор материалов и теплопотерь</h3>
            <div class="calculator-grid">
                <div class="calculator-form">
                    <div class="form-group">
                        <label>Длина стены (м):</label>
                        <input type="number" id="wall_length" class="form-control" value="10" min="1" step="0.1">
                    </div>
                    <div class="form-group">
                        <label>Высота стены (м):</label>
                        <input type="number" id="wall_height" class="form-control" value="3" min="1" step="0.1">
                    </div>
                    <div class="form-group">
                        <label>Тип блока:</label>
                        <select id="block_type" class="form-control">
                            <option value="">Выберите тип блока</option>
                            {% for block in blocks %}
                                <option value="{{ block.id }}">{{ block.get_block_type_display }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <button class="btn btn-primary" onclick="calculate()">Рассчитать</button>
                </div>
                <div class="calculator-result" id="calculator_result">
                    <div class="result-item">
                        <span class="result-label">Площадь стены:</span>
                        <span class="result-value" id="result_area">30 м²</span>
                    </div>
                    <div class="result-item">
                        <span class="result-label">Количество блоков:</span>
                        <span class="result-value" id="result_blocks">0 шт</span>
                    </div>
                    <div class="result-item">
                        <span class="result-label">Поддонов:</span>
                        <span class="result-value" id="result_pallets">0 шт</span>
                    </div>
                    <div class="result-item">
                        <span class="result-label">Вес стены:</span>
                        <span class="result-value" id="result_weight">0 кг</span>
                    </div>
                    <div class="result-item">
                        <span class="result-label">Расход бетона:</span>
                        <span class="result-value" id="result_concrete">0 м³</span>
                    </div>
                    <div class="result-item">
                        <span class="result-label">Теплопотери:</span>
                        <span class="result-value" id="result_heatloss">0 Вт</span>
                    </div>
                </div>
            </div>
        </div>
