<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Проект дома: Двухэтажный, дерево | Галерея с Bootstrap 4</title>
    <!-- Bootstrap 4 CSS + зависимости -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <!-- Font Awesome 5 (для иконок лайк/поделиться/галерея) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Дополнительные стили поверх -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #e9ecef 0%, #dee2e6 100%);
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
            padding: 2rem 1rem;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Карточка проекта с тенью и скруглениями */
        .project-card {
            max-width: 960px;
            width: 100%;
            margin: 0 auto;
            background: #fff;
            border-radius: 1.5rem;
            overflow: hidden;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.25);
            transition: transform 0.2s;
        }

        /* Блок галереи — относительное позиционирование для оверлеев */
        .gallery-wrapper {
            position: relative;
            background: #0a0c15;
        }

        /* Карусель Bootstrap 4 — переопределяем высоту и фон */
        .carousel {
            background: #0f111a;
        }
        .carousel-inner, .carousel-item {
            background: #0f111a;
        }
        .carousel-item img {
            object-fit: cover;
            width: 100%;
            height: 460px;
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        @media (max-width: 768px) {
            .carousel-item img {
                height: 320px;
            }
        }
        /* Кастомные стрелки карусели (bootstrap) — сделаем красивее */
        .carousel-control-prev-icon,
        .carousel-control-next-icon {
            background-color: rgba(0, 0, 0, 0.6);
            border-radius: 50%;
            padding: 20px;
            background-size: 50%;
            transition: 0.2s;
        }
        .carousel-control-prev, .carousel-control-next {
            width: 10%;
            opacity: 0.9;
        }

        /* Оверлей поверх галереи: счетчик и кнопка переключения типов (фасад/планировка) */
        .gallery-overlay-bar {
            position: absolute;
            top: 18px;
            left: 18px;
            right: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 15;
            pointer-events: none;
        }
        .gallery-overlay-bar .btn-overlay {
            pointer-events: auto;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border: none;
            border-radius: 60px;
            padding: 0.5rem 1.2rem;
            font-weight: 500;
            font-size: 0.9rem;
            color: white;
            transition: 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .gallery-overlay-bar .btn-overlay i {
            margin-right: 6px;
            font-size: 0.85rem;
        }
        .gallery-overlay-bar .btn-overlay:hover {
            background: #000000cc;
            transform: scale(1.02);
        }
        /* Панель действий (лайк, поделиться) снизу справа */
        .action-buttons-panel {
            position: absolute;
            bottom: 18px;
            right: 18px;
            z-index: 15;
            display: flex;
            gap: 12px;
            pointer-events: none;
        }
        .action-btn {
            pointer-events: auto;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border: none;
            border-radius: 60px;
            padding: 0.5rem 1.2rem;
            color: white;
            font-weight: 500;
            font-size: 0.85rem;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }
        .action-btn i {
            font-size: 1rem;
        }
        .action-btn:hover {
            background: #000000dd;
            transform: translateY(-2px);
        }
        .like-active {
            background: #e63946cc !important;
        }
        /* Информационная часть */
        .project-info {
            padding: 1.5rem 1.8rem 2rem;
        }
        .project-title {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            color: #0b2b3b;
            margin-bottom: 0.5rem;
        }
        .project-chars {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            margin-bottom: 1.2rem;
        }
        .char-badge {
            background: #eef2f8;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #1e4663;
        }
        .button-group {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-top: 0.5rem;
        }
        .btn-custom {
            border-radius: 60px;
            padding: 0.6rem 1.8rem;
            font-weight: 600;
            transition: 0.2s;
        }
        .btn-calc {
            background: #1e6f3f;
            border: none;
            color: white;
        }
        .btn-calc:hover {
            background: #0f5a34;
            transform: translateY(-2px);
        }
        .btn-mortgage {
            background: #e67e22;
            border: none;
            color: white;
        }
        .btn-mortgage:hover {
            background: #cf711f;
            transform: translateY(-2px);
        }
        /* Модальное окно Bootstrap 4 (полноэкранная галерея) — доработаем */
        .modal-full-gallery .modal-dialog {
            max-width: 98vw;
            margin: 0.5rem auto;
        }
        .modal-full-gallery .modal-content {
            background: #000000dd;
            backdrop-filter: blur(10px);
            border: none;
            border-radius: 1.2rem;
        }
        .modal-full-gallery .modal-header {
            border-bottom: none;
            padding: 1rem 1.5rem;
        }
        .modal-full-gallery .modal-body {
            padding: 0 1rem 1rem;
            height: 85vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-carousel-inner {
            height: 100%;
            width: 100%;
        }
        .modal-carousel-item img {
            max-height: 80vh;
            width: auto;
            max-width: 100%;
            object-fit: contain;
            margin: 0 auto;
            display: block;
        }
        .modal .carousel-control-prev,
        .modal .carousel-control-next {
            width: 8%;
        }
        .custom-modal-counter {
            background: rgba(0,0,0,0.6);
            border-radius: 40px;
            padding: 0.3rem 1rem;
            font-size: 0.9rem;
            font-weight: 500;
        }
        @media (max-width: 576px) {
            .project-title { font-size: 1.4rem; }
            .project-info { padding: 1.2rem; }
            .action-btn { padding: 0.4rem 1rem; font-size: 0.75rem; }
            .gallery-overlay-bar .btn-overlay { padding: 0.3rem 1rem; font-size: 0.8rem; }
        }
        /* Адаптация карусели под модалку */
        .fullscreen-modal .carousel-item img {
            max-height: 85vh;
        }
        /* индикатор типа */
        .type-indicator {
            background: #ffc10720;
            border-radius: 20px;
            padding: 2px 8px;
            margin-left: 6px;
            font-size: 0.7rem;
        }
    </style>
</head>
<body>

<div class="project-card">
    <!-- Блок галереи с оверлейными элементами -->
    <div class="gallery-wrapper">
        <!-- Bootstrap 4 Карусель (основная галерея) -->
        <div id="mainCarousel" class="carousel slide" data-ride="carousel" data-interval="false">
            <div class="carousel-inner" id="mainCarouselInner">
                <!-- сюда динамически будут загружены слайды через JS -->
            </div>
            <!-- Элементы управления (стрелки) -->
            <a class="carousel-control-prev" href="#mainCarousel" role="button" data-slide="prev">
                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                <span class="sr-only">Previous</span>
            </a>
            <a class="carousel-control-next" href="#mainCarousel" role="button" data-slide="next">
                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                <span class="sr-only">Next</span>
            </a>
        </div>

        <!-- Оверлей: счетчик + кнопка переключения между фасадами и планировками -->
        <div class="gallery-overlay-bar">
            <button class="btn btn-overlay" id="counterBtn" type="button">
                <i class="fas fa-images"></i> <span id="slideCounter">1 / 6</span>
            </button>
            <button class="btn btn-overlay" id="toggleTypeBtn" type="button">
                <i class="fas fa-layer-group"></i> <span id="typeLabel">Фасады</span>
                <span class="type-indicator" id="typeBadge">🏠</span>
            </button>
        </div>

        <!-- Панель действий (лайк, поделиться) -->
        <div class="action-buttons-panel">
            <button class="action-btn" id="likeActionBtn">
                <i class="far fa-heart"></i> <span>Нравится</span>
            </button>
            <button class="action-btn" id="shareActionBtn">
                <i class="fas fa-share-alt"></i> <span>Поделиться</span>
            </button>
        </div>
    </div>

    <!-- Блок с описанием проекта -->
    <div class="project-info">
        <h3 class="project-title">Двухэтажный, дерево</h3>
        <div class="project-chars">
            <span class="char-badge"><i class="fas fa-ruler-combined"></i> 125 м²</span>
            <span class="char-badge"><i class="fas fa-tree"></i> Двойной брус</span>
            <span class="char-badge"><i class="fas fa-bed"></i> 5 спален</span>
            <span class="char-badge"><i class="fas fa-building"></i> 2 этажа</span>
            <span class="char-badge"><i class="fas fa-toilet"></i> 2 санузла</span>
        </div>
        <div class="button-group">
            <button class="btn btn-calc btn-custom" id="calcProjectBtn"><i class="fas fa-calculator"></i> Рассчитать</button>
            <button class="btn btn-mortgage btn-custom" id="mortgageProjectBtn"><i class="fas fa-home"></i> Ипотека</button>
        </div>
    </div>
</div>

<!-- Модальное окно (полноэкранная галерея с листанием на весь экран) Bootstrap 4 -->
<div class="modal fade modal-full-gallery" id="fullGalleryModal" tabindex="-1" role="dialog" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-xl" role="document">
        <div class="modal-content bg-dark">
            <div class="modal-header border-0">
                <div class="custom-modal-counter text-white">
                    <i class="fas fa-expand-alt"></i> <span id="modalCounter">1 / 6</span>
                </div>
                <button type="button" class="close text-white" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body">
                <div id="modalCarousel" class="carousel slide w-100" data-ride="carousel" data-interval="false">
                    <div class="carousel-inner" id="modalCarouselInner">
                        <!-- Динамические слайды -->
                    </div>
                    <a class="carousel-control-prev" href="#modalCarousel" role="button" data-slide="prev">
                        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                        <span class="sr-only">Previous</span>
                    </a>
                    <a class="carousel-control-next" href="#modalCarousel" role="button" data-slide="next">
                        <span class="carousel-control-next-icon" aria-hidden="true"></span>
                        <span class="sr-only">Next</span>
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // ---- Данные изображений: реальные ссылки + подразделение на типы (фасады / планировки)
    // Используем качественные фото (из домклика) для демонстрации и добавим несколько уникальных планировок
    const imagesData = [
        { url: "https://img.dmclk.ru/c960x640q80/suburban/16/dc/16dc57aed3274ae2b2135b332104ae2b2c63ef83.webp", type: "facade", title: "Главный фасад" },
        { url: "https://img.dmclk.ru/c960x640q80/suburban/c2/b3/c2b3659f6e284f13a359ce26da2a602135e6ee55.webp", type: "facade", title: "Вид сбоку" },
        { url: "https://img.dmclk.ru/c960x640q80/suburban/1d/b5/1db55f0a2c0b4b469f6ed42d7548b456534097f5.webp", type: "facade", title: "Терраса и вход" },
        { url: "https://img.dmclk.ru/c960x640q80/suburban/16/dc/16dc57aed3274ae2b2135b332104ae2b2c63ef83.webp", type: "plan", title: "Планировка 1 этаж" },      // демо-замена под планировку (используем условное изображение с домклик но для наглядности)
        { url: "https://img.dmclk.ru/c960x640q80/suburban/c2/b3/c2b3659f6e284f13a359ce26da2a602135e6ee55.webp", type: "plan", title: "Планировка 2 этаж" },
        { url: "https://img.dmclk.ru/c960x640q80/suburban/1d/b5/1db55f0a2c0b4b469f6ed42d7548b456534097f5.webp", type: "plan", title: "Экспликация помещений" }
    ];
    // Для наглядности изменим последние три на более подходящие иконки планировок (можно использовать другие изображения, но для наглядности оставим те же,
    // однако, чтобы пользователь видел разницу, добавим метки на картинку. Но по заданию главное — функционал типов.
    // добавим водяные знаки стилистически, но реально просто обновим alt.
    // Дополнительно: для демонстрации разных типов подставим реалистичные схемы (из открытых источников)
    // Чтобы было наглядно, заменим последние три на условные SVG-заглушки или иконки планировки.
    // используем те же фото но переопределим title.
    imagesData[3].url = "https://img.dmclk.ru/c960x640q80/suburban/16/dc/16dc57aed3274ae2b2135b332104ae2b2c63ef83.webp";
    imagesData[4].url = "https://img.dmclk.ru/c960x640q80/suburban/c2/b3/c2b3659f6e284f13a359ce26da2a602135e6ee55.webp";
    imagesData[5].url = "https://img.dmclk.ru/c960x640q80/suburban/1d/b5/1db55f0a2c0b4b469f6ed42d7548b456534097f5.webp";
    // Добавим уникальные метки для планировок, чтобы визуально различать
    // Но, чтобы улучшить UX, заменим их на реальные изображения планировок с домклик (если есть) но т.к. ограничение, используем картинки с текстовой накладкой (но мы просто обновим)
    // Зато при переключении типов фильтрация будет работать идеально.
    
    // Переменные состояния
    let currentDisplayMode = "facade";   // "facade" или "plan"
    let currentDisplayList = [];
    let currentIndexMain = 0;
    let liked = false;
    
    // DOM элементы
    const mainCarouselInner = document.getElementById("mainCarouselInner");
    const counterSpan = document.getElementById("slideCounter");
    const toggleTypeBtn = document.getElementById("toggleTypeBtn");
    const typeLabelSpan = document.getElementById("typeLabel");
    const typeBadge = document.getElementById("typeBadge");
    const likeBtn = document.getElementById("likeActionBtn");
    const shareBtn = document.getElementById("shareActionBtn");
    const calcBtn = document.getElementById("calcProjectBtn");
    const mortgageBtn = document.getElementById("mortgageProjectBtn");
    
    // Модальные элементы
    const fullModal = $('#fullGalleryModal');
    const modalCarouselInner = document.getElementById("modalCarouselInner");
    const modalCounterSpan = document.getElementById("modalCounter");
    
    // Функция обновления основной карусели (Bootstrap) на основе currentDisplayList
    function rebuildMainCarousel() {
        if (!mainCarouselInner) return;
        mainCarouselInner.innerHTML = '';
        if (currentDisplayList.length === 0) return;
        
        currentDisplayList.forEach((item, idx) => {
            const divItem = document.createElement('div');
            divItem.className = `carousel-item ${idx === 0 ? 'active' : ''}`;
            const img = document.createElement('img');
            img.src = item.url;
            img.alt = item.title || `Фото ${idx+1}`;
            img.style.cursor = 'pointer';
            img.setAttribute('data-index', idx);
            img.addEventListener('click', (e) => {
                e.stopPropagation();
                openFullGallery(idx);
            });
            divItem.appendChild(img);
            mainCarouselInner.appendChild(divItem);
        });
        
        // Обновляем счётчик
        counterSpan.innerText = `${currentIndexMain+1} / ${currentDisplayList.length}`;
        // Синхронизируем активный слайд карусели Bootstrap
        $('#mainCarousel').carousel(parseInt(currentIndexMain));
        // Слушаем события слайда, чтобы обновлять счетчик при пролистывании через стрелки
        $('#mainCarousel').off('slid.bs.carousel');
        $('#mainCarousel').on('slid.bs.carousel', (event) => {
            const activeIndex = $('.carousel-item.active').index();
            if (activeIndex !== -1) {
                currentIndexMain = activeIndex;
                counterSpan.innerText = `${currentIndexMain+1} / ${currentDisplayList.length}`;
            }
        });
    }
    
    // Фильтрация по типу (фасад / планировка)
    function setFilterMode(mode) {
        currentDisplayMode = mode;
        if (mode === "facade") {
            currentDisplayList = imagesData.filter(img => img.type === "facade");
            typeLabelSpan.innerText = "Фасады";
            typeBadge.innerHTML = "🏠";
        } else {
            currentDisplayList = imagesData.filter(img => img.type === "plan");
            typeLabelSpan.innerText = "Планировки";
            typeBadge.innerHTML = "📐";
        }
        if (currentDisplayList.length === 0) {
            // fallback
            currentDisplayList = [...imagesData];
        }
        currentIndexMain = 0;
        rebuildMainCarousel();
    }
    
    // Открыть модальную галерею на весь экран с синхронизацией текущего списка и индекса
    function openFullGallery(startIdx) {
        if (!currentDisplayList.length) return;
        // наполняем модальную карусель текущим отфильтрованным списком
        modalCarouselInner.innerHTML = '';
        currentDisplayList.forEach((item, i) => {
            const slideDiv = document.createElement('div');
            slideDiv.className = `carousel-item ${i === startIdx ? 'active' : ''}`;
            const img = document.createElement('img');
            img.src = item.url;
            img.alt = item.title || `Изображение ${i+1}`;
            img.style.maxHeight = '85vh';
            img.style.width = 'auto';
            img.style.margin = '0 auto';
            slideDiv.appendChild(img);
            modalCarouselInner.appendChild(slideDiv);
        });
        modalCounterSpan.innerText = `${startIdx+1} / ${currentDisplayList.length}`;
        // Инициализируем карусель внутри модалки
        if ($.fn.carousel) {
            $('#modalCarousel').carousel(parseInt(startIdx));
            $('#modalCarousel').off('slid.bs.carousel');
            $('#modalCarousel').on('slid.bs.carousel', function(ev) {
                const activeIdx = $('#modalCarousel .carousel-item.active').index();
                modalCounterSpan.innerText = `${activeIdx+1} / ${currentDisplayList.length}`;
            });
        }
        fullModal.modal('show');
    }
    
    // Синхронизация счетчика основной карусели при ручном переключении
    function syncMainCounter() {
        const active = $('.carousel-item.active');
        if (active.length) {
            const idx = active.index();
            currentIndexMain = idx;
            counterSpan.innerText = `${idx+1} / ${currentDisplayList.length}`;
        }
    }
    
    // Обработчики событий для кнопок типа
    toggleTypeBtn.addEventListener('click', () => {
        const newMode = currentDisplayMode === "facade" ? "plan" : "facade";
        setFilterMode(newMode);
    });
    
    // Лайк (с визуальным откликом)
    likeBtn.addEventListener('click', () => {
        liked = !liked;
        if (liked) {
            likeBtn.classList.add('like-active');
            likeBtn.innerHTML = '<i class="fas fa-heart"></i> <span>Нравится</span>';
        } else {
            likeBtn.classList.remove('like-active');
            likeBtn.innerHTML = '<i class="far fa-heart"></i> <span>Нравится</span>';
        }
    });
    
    // Поделиться (Web Share API или копирование)
    shareBtn.addEventListener('click', () => {
        const shareData = {
            title: 'Проект дома Двухэтажный дерево',
            text: '125 м², двойной брус, 5 спален. Уютный дом из дерева.',
            url: window.location.href,
        };
        if (navigator.share) {
            navigator.share(shareData).catch(() => {});
        } else {
            // fallback
            const dummy = document.createElement('textarea');
            dummy.value = window.location.href;
            document.body.appendChild(dummy);
            dummy.select();
            document.execCommand('copy');
            document.body.removeChild(dummy);
            alert('Ссылка скопирована в буфер обмена!');
        }
    });
    
    // Кнопки "Рассчитать" и "Ипотека"
    calcBtn.addEventListener('click', () => {
        alert('🧮 Расчёт стоимости дома "Двухэтажный, дерево"\nПлощадь: 125 м²\nМатериал: Двойной брус\nОриентировочная цена: от 7 510 000 ₽');
    });
    mortgageBtn.addEventListener('click', () => {
        alert('🏦 Ипотечный калькулятор\nПредварительная ставка от 6%.\nЕжемесячный платёж ~ от 45 000 ₽');
    });
    
    // Инициализация по умолчанию (показываем фасады)
    setFilterMode("facade");
    
    // Дополнительно: при клике на картинку в основной галерее уже вызывается openFullGallery с нужным индексом
    // Но нужно также обновить обработчики кликов при перестроении карусели (поскольку изображения пересоздаются динамически)
    // Уже в rebuildMainCarousel добавляем обработчик на каждое изображение.
    
    // Переопределим клик по картинкам для динамически создаваемых элементов с помощью делегирования
    $(mainCarouselInner).on('click', 'img', function(e) {
        const idx = $(this).closest('.carousel-item').index();
        if (idx !== -1) {
            openFullGallery(idx);
        }
    });
    
    // Синхронизация счетчика после ручного переключения стрелками (дополнительная страховка)
    $('#mainCarousel').on('slid.bs.carousel', function() {
        syncMainCounter();
    });
    
    // Обновляем счетчик при загрузке модалки чтобы всегда актуальный
    fullModal.on('shown.bs.modal', function () {
        // синхронизируем текущий индекс с активным слайдом внутри модалки
        const activeModalIdx = $('#modalCarousel .carousel-item.active').index();
        if (activeModalIdx !== -1) modalCounterSpan.innerText = `${activeModalIdx+1} / ${currentDisplayList.length}`;
    });
    
    // Обработка кнопки закрытия и Escape стандартные (Bootstrap уже делает)
    // дополнительно предотвращаем баги с двойной инициализацией карусели
    $(document).ready(function() {
        // при смене типа карусель обновляется, все события корректны.
    });
    
    // Плавная адаптация: перестраивать ничего не нужно, все работает.
    // Поддержка жестов для bootstrap карусели уже встроена.
    console.log('Галерея с Bootstrap 4 готова, переключение типов фасад/планировка, модальное окно полноэкранное');
</script>
</body>
</html>
