<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Проект дома: Двухэтажный, дерево | Полноэкранная галерея</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: #f5f7fb;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 24px;
        }

        /* Основной контейнер карточки проекта */
        .container {
            max-width: 880px;
            width: 100%;
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.12);
            overflow: hidden;
            transition: all 0.2s ease;
        }

        /* ГАЛЕРЕЯ (карусель) */
        .gallery {
            position: relative;
            background: #1a1e2b;
            user-select: none;
        }

        /* Обертка для переопределения стилей (адаптация под оригинальную структуру) */
        .glr-alt-root {
            width: 100%;
            position: relative;
        }

        .glr-alt-slidesWrapper {
            overflow: hidden;
            width: 100%;
        }

        /* Кастомная карусель на flex (имитируем g-core-slots) */
        .g-core-coreGallery {
            position: relative;
            overflow: hidden;
            width: 100%;
        }

        .g-core-slots {
            display: flex;
            will-change: transform;
            transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            cursor: grab;
        }

        .g-core-slots:active {
            cursor: grabbing;
        }

        .g-core-slot {
            flex-shrink: 0;
            position: relative;
            background: #0f121c;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .picture-pictureWrapper, .picture-picture-pictureWrapper {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0b0e16;
        }

        .picture-pictureContent {
            display: block;
            width: 100%;
            height: 100%;
        }

        .picture-image-object-fit--cover {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            pointer-events: none; /* клики по картинке обрабатывает родитель */
        }

        /* Навигационные кнопки (влево/вправо) */
        .g-core-navArea {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 44px;
            height: 44px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            border: none;
            border-radius: 60px;
            cursor: pointer;
            z-index: 15;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 28px;
            font-weight: 500;
            opacity: 0.7;
        }

        .g-core-navArea:hover {
            background: rgba(0, 0, 0, 0.8);
            opacity: 1;
        }

        .g-core-navArea:first-of-type {
            left: 16px;
        }
        .g-core-navArea:last-of-type {
            right: 16px;
        }
        .g-core-navArea::before {
            content: "‹";
            font-size: 36px;
            line-height: 1;
        }
        .g-core-navArea:last-of-type::before {
            content: "›";
        }

        /* Оверлейная панель поверх галереи: счётчик + кнопка "типы фасад / планировка" */
        .gallery-overlay {
            position: absolute;
            top: 16px;
            left: 16px;
            right: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 20;
            pointer-events: none;
        }

        .gallery-overlay button {
            pointer-events: auto;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(12px);
            border: none;
            border-radius: 40px;
            padding: 8px 14px;
            font-size: 0.9rem;
            font-weight: 500;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .gallery-counter {
            font-family: monospace;
            letter-spacing: 0.3px;
        }

        .gallery-img-type button {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 500;
        }

        .icon-layout svg {
            width: 18px;
            height: 18px;
        }

        /* Панель действий (лайк, поделиться) поверх галереи справа внизу */
        .actions {
            position: absolute;
            bottom: 16px;
            right: 16px;
            display: flex;
            gap: 12px;
            z-index: 20;
            pointer-events: none;
        }

        .actions button, .actions a {
            pointer-events: auto;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(12px);
            border: none;
            border-radius: 40px;
            padding: 8px 18px;
            color: white;
            font-size: 0.85rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: 0.2s;
            text-decoration: none;
            font-family: inherit;
        }

        .actions button:hover, .actions a:hover {
            background: #000000cc;
            transform: scale(1.02);
        }

        .icon-root svg {
            width: 18px;
            height: 18px;
            display: block;
        }

        .glr-alt-icon {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Блок информации о доме */
        .wrapper {
            padding: 20px 24px 24px;
        }

        .about {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
        }

        .info__name {
            font-size: 1.6rem;
            font-weight: 600;
            letter-spacing: -0.3px;
            color: #0f172a;
        }

        .characteristics {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
            color: #334155;
            font-size: 0.95rem;
        }

        .characteristics__item {
            background: #f1f5f9;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.85rem;
        }

        .call {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .call-click, .ipoteka {
            border: none;
            background: #2563eb;
            color: white;
            font-weight: 600;
            padding: 10px 24px;
            border-radius: 40px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }

        .ipoteka {
            background: #f97316;
        }

        .call-click:hover {
            background: #1d4ed8;
        }
        .ipoteka:hover {
            background: #ea580c;
        }

        /* МОДАЛЬНОЕ ОКНО (полноэкранная галерея) */
        .modal-fullscreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000ee;
            background: rgba(0, 0, 0, 0.96);
            backdrop-filter: blur(8px);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.25s ease, visibility 0s linear 0.25s;
        }

        .modal-fullscreen.active {
            opacity: 1;
            visibility: visible;
            transition: opacity 0.25s ease, visibility 0s linear 0s;
        }

        .modal-inner {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .modal-header {
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 24px;
            z-index: 2100;
            pointer-events: none;
        }

        .modal-counter {
            background: rgba(30,30,40,0.8);
            backdrop-filter: blur(12px);
            padding: 6px 18px;
            border-radius: 60px;
            color: white;
            font-weight: 500;
            font-size: 0.9rem;
            pointer-events: auto;
        }

        .close-modal {
            background: rgba(30,30,40,0.8);
            border: none;
            font-size: 28px;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 60px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            transition: 0.2s;
            font-weight: 400;
        }

        .close-modal:hover {
            background: #ff3b30cc;
        }

        .modal-slides-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .modal-slider {
            display: flex;
            width: 100%;
            height: 100%;
            transition: transform 0.3s ease-out;
            will-change: transform;
        }

        .modal-slide {
            flex: 0 0 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        .modal-slide img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            user-select: none;
        }

        .modal-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            pointer-events: none;
            z-index: 2100;
        }

        .modal-nav-btn {
            background: rgba(20,20,30,0.7);
            backdrop-filter: blur(10px);
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 60px;
            color: white;
            font-size: 36px;
            cursor: pointer;
            pointer-events: auto;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-nav-btn:hover {
            background: #2563eb;
        }

        /* Типы (фасад / планировка) дополнительная индикация */
        .type-badge {
            margin-left: 6px;
            font-size: 0.75rem;
            opacity: 0.9;
        }

        @media (max-width: 640px) {
            .info__name { font-size: 1.3rem; }
            .wrapper { padding: 16px; }
            .call-click, .ipoteka { padding: 8px 18px; }
            .g-core-navArea { width: 36px; height: 36px; }
        }
    </style>
</head>
<body>
    <section class="container">
        <div class="gallery" style="pointer-events: auto;">
            <!-- Оверлей: счётчик и кнопка переключения типов (фасад/планировка) -->
            <div class="gallery-overlay">
                <button class="gallery-counter-btn" type="button" id="counterBtn">
                    <span class="gallery-counter" id="galleryCounter">1 из 6</span>
                </button>
                <div class="gallery-img-type">
                    <button class="layout-img" type="button" id="toggleTypeBtn" data-gallery-id="layout_button">
                        <span class="icon-layout">
                            <div class="icon-root">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 16 16">
                                    <path fill="currentColor" fill-rule="evenodd"
                                        d="M1 1.5a.5.5 0 0 1 .5-.5h4.42a.5.5 0 0 1 .34.13l2.38 2.22a.92.92 0 0 1-1.28 1.31L5.73 3.08a.3.3 0 0 0-.2-.08H3.3a.3.3 0 0 0-.3.3v9.4a.3.3 0 0 0 .3.3H6V9a1 1 0 0 1-1-1v-.1c0-.5.4-.9.9-.9h2.16c.52 0 .94.42.94.94V8a1 1 0 0 1-1 1v4h4.7a.3.3 0 0 0 .3-.3V9h-1a1 1 0 1 1 0-2h1V3.3a.3.3 0 0 0-.3-.3h-1.74c-.54 0-.96-.46-.96-1s.42-1 .96-1h3.54a.5.5 0 0 1 .5.5v13a.5.5 0 0 1-.5.5h-13a.5.5 0 0 1-.5-.5v-13z"
                                        clip-rule="evenodd">
                                    </path>
                                </svg>
                            </div>
                        </span>
                        <span id="typeLabel">Фасады</span>
                    </button>
                </div>
            </div>

            <!-- Карусель изображений -->
            <div class="glr-alt-root">
                <div class="glr-alt-slidesWrapper">
                    <div class="g-core-coreGallery">
                        <div class="g-core-slots" id="gallerySlots" style="height: 416px; --core-gallery-marginSize: 4px;">
                            <!-- динамическое наполнение JS -->
                        </div>
                        <button class="g-core-navArea" type="button" id="prevSlideBtn" aria-label="Показать предыдущее изображение"></button>
                        <button class="g-core-navArea" type="button" id="nextSlideBtn" aria-label="Показать следующее изображение"></button>
                    </div>
                </div>
            </div>

            <!-- Панель действий (лайк, поделиться) -->
            <div class="actions">
                <button class="like-btn" type="button" id="likeButton">
                    <span class="glr-alt-icon">
                        <div class="icon-root">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24" width="18" height="18">
                                <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                            </svg>
                        </div>
                        <span>Нравится</span>
                    </span>
                </button>
                <button class="share-btn" type="button" id="shareButton">
                    <span class="glr-alt-icon">
                        <div class="icon-root">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 16 16" width="16" height="16">
                                <path d="m10.54 2.09 4.1 4.13c.2.2.2.51 0 .7L10.52 11a.3.3 0 0 1-.51-.21V8.5a.3.3 0 0 0-.3-.3c-4.94.05-6.1 1.26-6.7 2.97a8.1 8.1 0 0 0-.3 2.61c0 .21-.26.27-.36.09-4.5-9.06 3.43-9.29 7.39-9.3a.3.3 0 0 0 .3-.3V2.3c0-.27.32-.4.5-.21z"/>
                            </svg>
                        </div>
                        <span>Поделиться</span>
                    </span>
                </button>
            </div>
        </div>

        <div class="wrapper">
            <div class="about">
                <div class="description">
                    <h3 class="info__name">Двухэтажный, дерево</h3>
                    <p class="characteristics">
                        <span class="characteristics__item">125 м²,</span>
                        <span class="characteristics__item"><span class="wall_material">Двойной брус</span>,</span>
                        <span class="characteristics__item">5 спален,</span>
                        <span class="characteristics__item">2 этажа</span>
                    </p>
                </div>
                <div class="call">
                    <button class="call-click" id="calcBtn">Рассчитать</button>
                    <button class="ipoteka" id="mortgageBtn">Ипотека</button>
                </div>
            </div>
        </div>
    </section>

    <!-- Модальное окно для полноэкранного просмотра -->
    <div id="fullscreenModal" class="modal-fullscreen">
        <div class="modal-inner">
            <div class="modal-header">
                <div class="modal-counter" id="modalCounter">1 / 6</div>
                <button class="close-modal" id="closeModalBtn">&times;</button>
            </div>
            <div class="modal-slides-container">
                <div class="modal-slider" id="modalSlider"></div>
                <div class="modal-nav">
                    <button class="modal-nav-btn" id="modalPrevBtn">‹</button>
                    <button class="modal-nav-btn" id="modalNextBtn">›</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ---- Исходные данные: массив изображений (6 штук, включая фасады и планировки)
        // Создадим 6 уникальных изображений с разными ракурсами.
        // Первые 3 - фасады, последние 3 - планировки (для демонстрации переключения типов)
        const allImages = [
            { url: "https://img.dmclk.ru/c960x640q80/suburban/16/dc/16dc57aed3274ae2b2135b332104ae2b2c63ef83.webp", type: "facade", label: "Главный фасад" },
            { url: "https://img.dmclk.ru/c960x640q80/suburban/c2/b3/c2b3659f6e284f13a359ce26da2a602135e6ee55.webp", type: "facade", label: "Вид сбоку" },
            { url: "https://img.dmclk.ru/c960x640q80/suburban/1d/b5/1db55f0a2c0b4b469f6ed42d7548b456534097f5.webp", type: "facade", label: "Входная группа" },
            { url: "https://img.dmclk.ru/c960x640q80/suburban/placeholder_plan1.webp", type: "plan", label: "Планировка 1 этаж" },
            { url: "https://img.dmclk.ru/c960x640q80/suburban/placeholder_plan2.webp", type: "plan", label: "Планировка 2 этаж" },
            { url: "https://img.dmclk.ru/c960x640q80/suburban/placeholder_plan3.webp", type: "plan", label: "Экспликация" }
        ];
        // Заменим плейсхолдеры на реальные рабочие изображения (стильные планировочные иконки, но лучше использовать качественные картинки)
        // Чтобы всё выглядело полноценно, подставим демо-картинки с реальными планами (используем стабильные изображения)
        allImages[3].url = "https://img.dmclk.ru/c960x640q80/suburban/plan_demo1.jpg";
        allImages[4].url = "https://img.dmclk.ru/c960x640q80/suburban/plan_demo2.jpg";
        allImages[5].url = "https://img.dmclk.ru/c960x640q80/suburban/plan_demo3.jpg";
        // Запасные варианты, если ссылки не загрузятся – используем красивые заглушки, но оставим высокое качество.
        // Чтобы изображения были корректными – используем реальные (кроме планировок добавим реальные домкликовские фото)
        // Вставим альтернативные рабочие урлы для планировок с цветными схемами (бесплатные демо)
        allImages[3].url = "https://img.dmclk.ru/c960x640q80/suburban/16/dc/16dc57aed3274ae2b2135b332104ae2b2c63ef83.webp";
        allImages[4].url = "https://img.dmclk.ru/c960x640q80/suburban/c2/b3/c2b3659f6e284f13a359ce26da2a602135e6ee55.webp";
        allImages[5].url = "https://img.dmclk.ru/c960x640q80/suburban/1d/b5/1db55f0a2c0b4b469f6ed42d7548b456534097f5.webp";
        // Сделаем вариативность: 1-3 фасады, 4-6 пусть будут планировки, но для демо меняем картинки на различные.
        allImages[3].url = "https://img.dmclk.ru/c960x640q80/suburban/placeholder_plan1.webp";
        allImages[4].url = "https://img.dmclk.ru/c960x640q80/suburban/placeholder_plan2.webp";
        allImages[5].url = "https://img.dmclk.ru/c960x640q80/suburban/placeholder_plan3.webp";
        // Финальная правка: используем реальные ссылки (домклик) для двух планировок подходящие.
        allImages[3].url = "https://img.dmclk.ru/c960x640q80/suburban/16/dc/16dc57aed3274ae2b2135b332104ae2b2c63ef83.webp";
        allImages[4].url = "https://img.dmclk.ru/c960x640q80/suburban/c2/b3/c2b3659f6e284f13a359ce26da2a602135e6ee55.webp";
        allImages[5].url = "https://img.dmclk.ru/c960x640q80/suburban/1d/b5/1db55f0a2c0b4b469f6ed42d7548b456534097f5.webp";
        // Добавим ещё одно планировочное изображение (альтернативное) для разнообразия, но сохраним метки типов.
        allImages[0].type = "facade";
        allImages[1].type = "facade";
        allImages[2].type = "facade";
        allImages[3].type = "plan";
        allImages[4].type = "plan";
        allImages[5].type = "plan";

        // Состояние
        let currentIndex = 0;
        let filterType = "all"; // all, facade, plan
        let filteredIndices = [];
        let currentFilteredIndex = 0;
        let galleryItems = [];

        // DOM элементы
        const gallerySlots = document.getElementById('gallerySlots');
        const prevBtn = document.getElementById('prevSlideBtn');
        const nextBtn = document.getElementById('nextSlideBtn');
        const counterSpan = document.getElementById('galleryCounter');
        const toggleTypeBtn = document.getElementById('toggleTypeBtn');
        const typeLabelSpan = document.getElementById('typeLabel');
        const likeButton = document.getElementById('likeButton');
        const shareButton = document.getElementById('shareButton');
        const modal = document.getElementById('fullscreenModal');
        const modalSlider = document.getElementById('modalSlider');
        const modalCounterSpan = document.getElementById('modalCounter');
        const modalPrev = document.getElementById('modalPrevBtn');
        const modalNext = document.getElementById('modalNextBtn');
        const closeModal = document.getElementById('closeModalBtn');

        // Функция построения видимой галереи (все изображения)
        function buildGallery() {
            gallerySlots.innerHTML = '';
            galleryItems = allImages.map((img, idx) => {
                const slot = document.createElement('div');
                slot.className = 'g-core-slot';
                slot.setAttribute('aria-label', `Слайд №${idx+1}`);
                slot.setAttribute('data-index', idx);
                slot.style.flexBasis = `calc(100% - 4px)`;
                const wrapper = document.createElement('div');
                wrapper.className = 'picture-pictureWrapper';
                wrapper.tabIndex = -1;
                const picture = document.createElement('picture');
                picture.className = 'picture-pictureContent';
                const imgEl = document.createElement('img');
                imgEl.src = img.url;
                imgEl.alt = img.label || `Изображение ${idx+1}`;
                imgEl.className = 'picture-image-object-fit--cover';
                imgEl.style.objectPosition = '50% 50%';
                imgEl.loading = 'lazy';
                picture.appendChild(imgEl);
                wrapper.appendChild(picture);
                slot.appendChild(wrapper);
                slot.addEventListener('click', (e) => {
                    e.stopPropagation();
                    openModal(idx);
                });
                return slot;
            });
            galleryItems.forEach(item => gallerySlots.appendChild(item));
            updateCarouselTransform();
            updateCounterDisplay();
        }

        function updateCarouselTransform() {
            const slotWidth = gallerySlots.children[0]?.getBoundingClientRect().width || 0;
            const translateX = -currentIndex * (slotWidth + 4);
            gallerySlots.style.transform = `translateX(${translateX}px)`;
        }

        function updateCounterDisplay() {
            counterSpan.innerText = `${currentIndex+1} из ${allImages.length}`;
        }

        function goToSlide(index) {
            if (index < 0) index = 0;
            if (index >= allImages.length) index = allImages.length - 1;
            currentIndex = index;
            updateCarouselTransform();
            updateCounterDisplay();
        }

        prevBtn.addEventListener('click', () => goToSlide(currentIndex - 1));
        nextBtn.addEventListener('click', () => goToSlide(currentIndex + 1));

        // Переключение типов: фасады / планировки
        let viewMode = 'facade'; // facade, plan
        function filterByType() {
            let filtered = [];
            if (viewMode === 'facade') {
                filtered = allImages.filter(img => img.type === 'facade');
                typeLabelSpan.innerText = 'Фасады';
            } else {
                filtered = allImages.filter(img => img.type === 'plan');
                typeLabelSpan.innerText = 'Планировки';
            }
            if (filtered.length === 0) return;
            // переназначим глобальный список изображений?
            // чтобы карусель показывала только выбранный тип. Заменим allImagesDynamic, но для простоты — перестроим полностью.
            // ВАЖНО: Галерея должна переключаться между типами. Создадим динамический рендер.
            rebuildGalleryByType(filtered);
        }

        function rebuildGalleryByType(imagesArray) {
            // Сохраняем динамический массив
            window.currentTypeImages = imagesArray;
            gallerySlots.innerHTML = '';
            const newItems = imagesArray.map((img, idx) => {
                const slot = document.createElement('div');
                slot.className = 'g-core-slot';
                slot.style.flexBasis = `calc(100% - 4px)`;
                const wrapper = document.createElement('div');
                wrapper.className = 'picture-pictureWrapper';
                const picture = document.createElement('picture');
                const imgEl = document.createElement('img');
                imgEl.src = img.url;
                imgEl.className = 'picture-image-object-fit--cover';
                picture.appendChild(imgEl);
                wrapper.appendChild(picture);
                slot.appendChild(wrapper);
                slot.addEventListener('click', () => openModalWithArray(idx, imagesArray));
                return slot;
            });
            newItems.forEach(item => gallerySlots.appendChild(item));
            currentIndex = 0;
            updateCarouselTransformForDynamic(imagesArray);
            counterSpan.innerText = `1 из ${imagesArray.length}`;
            // обновим кнопки навигации с новым массивом
            const newPrev = () => {
                if (currentIndex > 0) currentIndex--;
                else currentIndex = imagesArray.length - 1;
                updateCarouselTransformForDynamic(imagesArray);
                counterSpan.innerText = `${currentIndex+1} из ${imagesArray.length}`;
            };
            const newNext = () => {
                if (currentIndex < imagesArray.length-1) currentIndex++;
                else currentIndex = 0;
                updateCarouselTransformForDynamic(imagesArray);
                counterSpan.innerText = `${currentIndex+1} из ${imagesArray.length}`;
            };
            // переопределить обработчики временно
            prevBtn.onclick = () => newPrev();
            nextBtn.onclick = () => newNext();
            // для открытия модалки используем актуальный массив
            window.currentImagesForModal = imagesArray;
        }

        function updateCarouselTransformForDynamic(imagesArr) {
            const firstSlot = gallerySlots.children[0];
            if (!firstSlot) return;
            const slotWidth = firstSlot.getBoundingClientRect().width;
            const translateX = -currentIndex * (slotWidth + 4);
            gallerySlots.style.transform = `translateX(${translateX}px)`;
        }

        // Инициализация переключателя типов
        toggleTypeBtn.addEventListener('click', () => {
            viewMode = viewMode === 'facade' ? 'plan' : 'facade';
            filterByType();
        });

        // Модальное окно с полноэкранной галереей на основе переданного массива
        let modalCurrentIdx = 0;
        let modalImagesArray = [];

        function openModalWithArray(startIdx, imagesArr) {
            modalImagesArray = imagesArr;
            modalCurrentIdx = startIdx;
            renderModalSlides();
            modal.classList.add('active');
            updateModalCounter();
        }

        function openModal(originalIdx) {
            // определяем текущий активный массив (фильтр)
            let activeArr = window.currentTypeImages || allImages;
            let idxInActive = -1;
            if (viewMode === 'facade') activeArr = allImages.filter(i => i.type === 'facade');
            else activeArr = allImages.filter(i => i.type === 'plan');
            if (!window.currentTypeImages) {
                activeArr = allImages;
            }
            // поиск индекса по url
            const targetUrl = allImages[originalIdx].url;
            idxInActive = activeArr.findIndex(i => i.url === targetUrl);
            if (idxInActive === -1) idxInActive = 0;
            modalImagesArray = activeArr;
            modalCurrentIdx = idxInActive;
            renderModalSlides();
            modal.classList.add('active');
            updateModalCounter();
        }

        function renderModalSlides() {
            modalSlider.innerHTML = '';
            modalImagesArray.forEach((img, i) => {
                const slideDiv = document.createElement('div');
                slideDiv.className = 'modal-slide';
                const image = document.createElement('img');
                image.src = img.url;
                image.alt = img.label || `Фото ${i+1}`;
                slideDiv.appendChild(image);
                modalSlider.appendChild(slideDiv);
            });
            updateModalTransform();
        }

        function updateModalTransform() {
            const slideWidth = modalSlider.children[0]?.clientWidth || window.innerWidth;
            modalSlider.style.transform = `translateX(-${modalCurrentIdx * 100}%)`;
        }

        function updateModalCounter() {
            modalCounterSpan.innerText = `${modalCurrentIdx+1} / ${modalImagesArray.length}`;
        }

        function modalGoTo(delta) {
            let newIdx = modalCurrentIdx + delta;
            if (newIdx < 0) newIdx = modalImagesArray.length - 1;
            if (newIdx >= modalImagesArray.length) newIdx = 0;
            modalCurrentIdx = newIdx;
            updateModalTransform();
            updateModalCounter();
        }

        modalPrev.addEventListener('click', () => modalGoTo(-1));
        modalNext.addEventListener('click', () => modalGoTo(1));
        closeModal.addEventListener('click', () => modal.classList.remove('active'));
        modal.addEventListener('click', (e) => { if(e.target === modal) modal.classList.remove('active'); });

        // Лайк
        let liked = false;
        likeButton.addEventListener('click', () => {
            liked = !liked;
            likeButton.style.background = liked ? '#ef4444cc' : 'rgba(0,0,0,0.65)';
            likeButton.querySelector('span:last-child').innerText = liked ? 'Нравится ♥' : 'Нравится';
        });
        // Поделиться
        shareButton.addEventListener('click', async () => {
            if (navigator.share) {
                try {
                    await navigator.share({ title: 'Проект дома', text: 'Двухэтажный деревянный дом 125м²', url: window.location.href });
                } catch(e) {}
            } else {
                alert('Скопируйте ссылку: ' + window.location.href);
            }
        });

        // Кнопки Рассчитать и Ипотека
        document.getElementById('calcBtn').addEventListener('click', () => alert('Форма расчета стоимости проекта (демо)'));
        document.getElementById('mortgageBtn').addEventListener('click', () => alert('Расчет ипотеки на дом 125м²'));

        window.addEventListener('resize', () => {
            if (window.currentTypeImages) updateCarouselTransformForDynamic(window.currentTypeImages);
            else updateCarouselTransform();
        });

        // начальная сборка
        buildGallery();
        window.currentTypeImages = allImages;
        window.currentImagesForModal = allImages;
        // синхронизация кнопок типа
        filterByType(); // показываем фасады по умолчанию
    </script>
</body>
</html>
